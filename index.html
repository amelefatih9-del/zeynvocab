<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Kelime Quiz (Bölüm Seçmeli)</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            background-color: rgba(59, 130, 246, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 10px;
        }

        /* MENU SCREEN */
        .menu-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 0;
        }

        .menu-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }
        
        .menu-btn.mixed {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            margin-top: 8px;
        }
        
        .menu-btn.mixed:hover {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
        }

        /* Stats Panel */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: rgba(15, 23, 42, 0.4);
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            color: var(--text-main);
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Quiz Box */
        .direction-badge {
            display: inline-block;
            padding: 4px 10px;
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.4;
            color: var(--text-main);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.7);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            text-align: left;
            color: var(--text-main);
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            position: relative;
            outline: none;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.05);
            transform: translateY(-1px);
        }

        .option-btn:disabled { cursor: not-allowed; }

        .option-key {
            background-color: var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 12px;
            min-width: 22px;
            text-align: center;
        }

        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--success) !important;
            color: #10b981 !important;
            font-weight: 600;
        }
        .option-btn.correct .option-key { background-color: var(--success); color: white; }

        .option-btn.incorrect {
            background-color: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--danger) !important;
            color: #ef4444 !important;
        }
        .option-btn.incorrect .option-key { background-color: var(--danger); color: white; }

        .action-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 48px;
        }

        .keyboard-tip {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .key-badge {
            background-color: var(--border-color);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            color: var(--text-main);
        }

        .next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
            align-items: center;
            gap: 6px;
        }
        .next-btn:hover { background-color: var(--primary-hover); }

        /* Score Screen */
        .result-box { text-align: center; padding: 10px 0; }
        .result-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .result-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
        .score-display { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
        .percentage-bar-container { width: 100%; height: 12px; background-color: var(--border-color); border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .percentage-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 6px; transition: width 1s cubic-bezier(0.1, 0.8, 0.3, 1); }
        
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .summary-card { background-color: rgba(15, 23, 42, 0.3); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; }
        .summary-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        .summary-value { font-size: 1.2rem; font-weight: 600; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .action-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: none; }
        
        .btn-menu { background-color: var(--border-color); color: white; }
        .btn-menu:hover { background-color: #475569; }
        
        .btn-retry-wrong { background-color: transparent; color: #f43f5e; border: 2px solid rgba(244, 63, 94, 0.4); }
        .btn-retry-wrong:hover:not(:disabled) { background-color: rgba(244, 63, 94, 0.1); border-color: #f43f5e; }
        .btn-retry-wrong:disabled { color: var(--text-muted); border-color: var(--border-color); opacity: 0.5; cursor: not-allowed; }

        .info-panel { width: 100%; max-width: 650px; border: 1px dashed var(--border-color); border-radius: 12px; padding: 16px; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
        .info-title { color: var(--text-main); font-weight: 600; margin-bottom: 6px; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 16px; }
            h1 { font-size: 1.5rem; }
            .question-text { font-size: 1.25rem; }
            .option-btn { padding: 12px; font-size: 0.95rem; }
            .stats-summary { grid-template-columns: 1fr; }
            .keyboard-tip { display: none; }
        }
    </style>
</head>
<body>

        <header>
            <h1>📝 Kelime Testi</h1>
            <div class="subtitle" id="current-mode-label">Lütfen Bölüm Seçin</div>

        <div id="menu-screen" class="menu-box">
            <button class="menu-btn" onclick="initGame(1)">📘 Chapter 1 Çöz</button>
            <button class="menu-btn" onclick="initGame(2)">📙 Chapter 2 Çöz</button>

            <button class="menu-btn mixed" onclick="initGame(4)">🎲 Karışık Çöz (1, 2 & 3)</button>
        </div>

        <div id="quiz-screen" style="display: none;">

                <div class="stat-item"><span>Soru:</span> <span class="stat-value" id="stat-progress">0/0</span></div>

            <div id="question-text" class="question-text">Yükleniyor...</div>

            <div class="options-grid" id="options-grid"></div>

            <div class="action-footer">
                <div class="keyboard-tip">
                    <span class="key-badge
