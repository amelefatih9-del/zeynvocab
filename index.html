<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açık Uçlu Vocabulary Quiz</title>
<style>
body {
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.container {
max-width:800px;
margin:auto;
background:#1e293b;
padding:24px;
border-radius:20px;
}

.top {
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.question {
font-size:28px;
line-height:1.5;
margin-bottom:20px;
}

input {
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:#334155;
color:white;
}

button {
width:100%;
padding:16px;
margin-top:15px;
font-size:18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
}

.result {
margin-top:20px;
font-size:22px;
line-height:1.7;
}

.correct {
color:#22c55e;
}

.wrong {
color:#ef4444;
}
</style>
</head>
<body>

<div class="container">

<h1>Açık Uçlu Vocabulary Quiz</h1>

<div class="top">
<div id="counter"></div>
<div id="score">Doğru: 0 | Yanlış: 0</div>
</div>

<div class="question" id="question"></div>

<input type="text" id="answerInput" placeholder="Cevabı yaz..." autocomplete="off">

<button id="checkBtn">Kontrol Et</button>

<div class="result" id="result"></div>

</div>

<script>

var words = [["alter","bir şeyin yapısını değiştirmek"],
["analysis","analiz"],
["analytical","analitik"],
["analyze","tahlil etmek, çözümlemek, analiz etmek"],
["approach","yaklaşım, yaklaşma"],
["approachable","yaklaşılması/ ulaşılması mümkün"],
["arbitrarily","keyfi biçimde"],
["arbitrariness","keyfilik"],
["arbitrary","rastgele, keyfi"],
["assign","atamak, tayin etmek, ayırmak, tahsis etmek"],
["assignment","atama, görev"],
["assume","kabul etmek, farzetmek, varsaymak, sanmak, zannetmek"],
["assuming that","varsayalım ki"],
["assumption","varsayım"],
["compensate","tazmin etmek"],
["compensation","tazminat"],
["complex","kompleks, karışık"],
["complexity","karmaşıklık"],
["compliance","itaat, boyun eğme"],
["compliant","itaatkar, boyun eğen"],
["comply","-e uymak, -e riayet etmek"],
["component","öge, unsur, bileşimin ana parçası, mütemmim cüz"],
["concept","kavram, mefhum, görüş, fikir"],
["conceptual","kavramsal"],
["conceptualize","kavramsallaştırmak"],
["conclude","sonuca varmak, sonuç çıkarmak"],
["conclusion","sonuç"],
["conclusive","kesin, net"],
["in conclusion","sonuç olarak"],
["consist in","-e bağlı olmak, -e dayanmak"],
["consist of","-den meydana gelmek, -den ibaret olmak"],
["constancy","devamlılık, süreklilik"],
["constant","sabit, değişmez, sürekli, devamlı"],
["constantly","sık sık, sürekli biçimde"],
["construct","yapmak, inşa etmek, kurmak"],
["construction","yapım"],
["constructor","yapımcı"],
["consult","danışmak, başvurmak"],
["consultancy","danışmanlık işi"],
["consultant","danışman"],
["consultation","danışma, konuşma"],
["consultative","danışma ile ilgili"],
["contact","iletişim, temas, ilişki, bağlantı"],
["context","bağlam, kontekst"],
["criterion","kriter, ölçüt"],
["data","bilgi, veri, data"],
["definable","tanımlanabilir"],
["define","tanımlamak, tarif etmek"],
["definition","tanım"],
["definite","kesin, belirli, belli"],
["definitely","kesin biçimde"]];

var current = 0;
var correctCount = 0;
var wrongCount = 0;
var currentAnswer = "";

shuffle(words);

function shuffle(array) {

for(var i=array.length-1;i>0;i--) {

var j=Math.floor(Math.random()*(i+1));

var temp=array[i];
array[i]=array[j];
array[j]=temp;

}
}

function loadQuestion() {

if(current >= words.length) {

document.getElementById("question").innerHTML =
"Quiz Bitti 🎉";

document.getElementById("answerInput").style.display = "none";
document.getElementById("checkBtn").style.display = "none";

document.getElementById("result").innerHTML =
"Doğru: " + correctCount +
"<br>Yanlış: " + wrongCount +
"<br>Başarı: %" +
Math.round((correctCount/words.length)*100);

return;
}

var item = words[current];

var askTR = Math.random() > 0.5;

var q = "";
var answer = "";

if(askTR) {

q = item[0] + " kelimesinin Türkçesi nedir?";
answer = item[1];

} else {

q = item[1] + " ifadesinin İngilizcesi nedir?";
answer = item[0];
}

currentAnswer = answer.toLowerCase();

document.getElementById("question").innerHTML = q;

document.getElementById("counter").innerHTML =
"Soru " + (current+1) + " / " + words.length;

document.getElementById("answerInput").value = "";

document.getElementById("result").innerHTML = "";
}

document.getElementById("checkBtn").onclick = function() {

var user =
document.getElementById("answerInput").value
.toLowerCase()
.trim();

if(user === currentAnswer) {

correctCount++;

document.getElementById("result").innerHTML =
"<span class='correct'>Doğru ✅</span>";

} else {

wrongCount++;

document.getElementById("result").innerHTML =
"<span class='wrong'>Yanlış ❌</span><br><br>" +
"Doğru cevap:<br>" + currentAnswer;
}

document.getElementById("score").innerHTML =
"Doğru: " + correctCount +
" | Yanlış: " + wrongCount;

current++;

setTimeout(function() {
loadQuestion();
}, 1800);

};

document.getElementById("answerInput")
.addEventListener("keypress", function(e) {

if(e.key === "Enter") {
document.getElementById("checkBtn").click();
}

});

loadQuestion();

</script>

</body>
</html>
