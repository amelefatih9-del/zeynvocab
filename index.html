<style>

.container{max-width:850px;margin:auto;background:#1e293b;padding:24px;border-radius:20px}
.top{display:flex;justify-content:space-between;margin-bottom:20px}
.question{font-size:28px;line-height:1.5;margin-bottom:20px}
.choice{display:block;width:100%;padding:16px;margin-top:12px;border:none;border-radius:12px;background:#334155;color:white;font-size:18px}
.correct{background:#16a34a!important}
.wrong{background:#dc2626!important}
#nextBtn{display:none;width:100%;padding:16px;margin-top:20px;border:none;border-radius:12px;background:#2563eb;color:white;font-size:18px}
.result{font-size:24px;text-align:center;line-height:1.8;margin-top:25px}

<body>
<div class="container">
<h1>Vocabulary Quiz</h1>
<div class="top">
<div id="counter"></div>
<div id="score">Doğru: 0 | Yanlış: 0</div>
</div>
<div class="question" id="question"></div>
<div id="choices"></div>
<button id="nextBtn">Sonraki Soru</button>
<div class="result" id="result"></div>
</div>

var current = 0;
var correctCount = 0;
var wrongCount = 0;
var currentCorrect = "";

shuffle(words);

function shuffle(array){
for(var i=array.length-1;i>0;i--){
var j=Math.floor(Math.random()*(i+1));
var temp=array[i];
array[i]=array[j];
array[j]=temp;
}
}

function loadQuestion(){

document.getElementById("nextBtn").style.display="none";

if(current >= words.length){
document.getElementById("question").innerHTML="Quiz Bitti 🎉";
document.getElementById("choices").innerHTML="";
document.getElementById("counter").innerHTML="";
document.getElementById("result").innerHTML=
"Doğru: "+correctCount+"<br>Yanlış: "+wrongCount+
"<br>Başarı: %"+Math.round((correctCount/words.length)*100);
return;
}

var item = words[current];
var askTR = Math.random() > 0.5;

var questionText = "";
var correct = "";

if(askTR){
questionText = item[0] + " kelimesinin Türkçesi nedir?";
correct = item[1];
} else {
questionText = item[1] + " kelimesinin İngilizcesi nedir?";
correct = item[0];
}

currentCorrect = correct;

document.getElementById("question").innerHTML = questionText;
document.getElementById("counter").innerHTML =
"Soru " + (current+1) + " / " + words.length;

var options = [correct];

while(options.length < 4){
var rand = words[Math.floor(Math.random()*words.length)];
var value = askTR ? rand[1] : rand[0];

if(options.indexOf(value) === -1){
options.push(value);
}
}

shuffle(options);

var html = "";

for(var i=0;i<options.length;i++){

html += "<button class='choice' onclick='checkAnswer(this)'>" +
options[i] + "</button>";
}

document.getElementById("choices").innerHTML = html;
}

function checkAnswer(btn){

var buttons = document.getElementsByClassName("choice");

for(var i=0;i<buttons.length;i++){

buttons[i].disabled = true;

if(buttons[i].innerHTML === currentCorrect){
buttons[i].className = "choice correct";
}
}

if(btn.innerHTML === currentCorrect){
correctCount++;
} else {
wrongCount++;
btn.className = "choice wrong";
}

document.getElementById("score").innerHTML =
"Doğru: " + correctCount + " | Yanlış: " + wrongCount;

document.getElementById("nextBtn").style.display="block";
}

document.getElementById("nextBtn").onclick = function(){
current++;
loadQuestion();
};

loadQuestion();
</script>
