<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Vocabulary Quiz</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#1e293b;
padding:24px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.top{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
font-size:18px;
}

.question{
font-size:30px;
line-height:1.5;
margin-bottom:20px;
}

.choice{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-size:18px;
}

.choice.correct{
background:#16a34a;
}

.choice.wrong{
background:#dc2626;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#334155;
color:white;
font-size:18px;
margin-top:10px;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
}

.hidden{
display:none;
}

.result{
margin-top:25px;
font-size:24px;
line-height:1.8;
text-align:center;
}

.small{
font-size:16px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>Ultimate Vocabulary Quiz</h1>

<div class="top">
<div id="counter"></div>
<div id="score">Doğru: 0 | Yanlış: 0</div>
<div id="mode"></div>
</div>

<div id="question" class="question"></div>

<div id="multipleChoiceArea"></div>

<div id="openEndedArea" class="hidden">
<input type="text" id="answerInput" placeholder="Cevabı yaz...">
<button id="checkBtn">Kontrol Et</button>
</div>

<button id="nextBtn" class="hidden">Sonraki Soru</button>

<div id="result" class="result"></div>

</div>

<script>

var words = [

["alter","bir şeyin yapısını değiştirmek"],
["analysis","analiz"],
["analytical","analitik"],
["analyze","tahlil etmek, çözümlemek, analiz etmek"],
["approach","yaklaşım, yaklaşma"],
["approachable","yaklaşılması/ ulaşılması mümkün"],
["arbitrarily","keyfi biçimde"],
["arbitrariness","keyfilik"],
["arbitrary","rastgele, keyfi"],
["assign","atamak, tayin etmek, ayırmak, tahsis etmek"],
["assignment","atama, görev"],
["assume","kabul etmek, farzetmek, varsaymak, sanmak, zannetmek"],
["assuming that","varsayalım ki"],
["assumption","varsayım"],
["compensate","tazmin etmek"],
["compensation","tazminat"],
["complex","kompleks, karışık"],
["complexity","karmaşıklık"],
["compliance","itaat, boyun eğme"],
["compliant","itaatkar, boyun eğen"],
["comply","-e uymak, -e riayet etmek"],
["component","öge, unsur, bileşimin ana parçası, mütemmim cüz"],
["concept","kavram, mefhum, görüş, fikir"],
["conceptual","kavramsal"],
["conceptualize","kavramsallaştırmak"],
["conclude","sonuca varmak, sonuç çıkarmak"],
["conclusion","sonuç"],
["conclusive","kesin, net"],
["consist in","-e bağlı olmak, -e dayanmak"],
["consist of","-den meydana gelmek, -den ibaret olmak"],
["constancy","devamlılık, süreklilik"],
["constant","sabit, değişmez, sürekli, devamlı"],
["constantly","sık sık, sürekli biçimde"],
["construct","yapmak, inşa etmek, kurmak"],
["construction","yapım"],
["constructor","yapımcı"],
["consult","danışmak, başvurmak"],
["consultancy","danışmanlık işi"],
["consultant","danışman"],
["consultation","danışma, konuşma"],
["consultative","danışma ile ilgili"],
["contact","iletişim, temas, ilişki, bağlantı"],
["context","bağlam, kontekst"],
["criterion","kriter, ölçüt"],
["data","bilgi, veri, data"],
["define","tanımlamak, tarif etmek"],
["definition","tanım"],
["definite","kesin, belirli, belli"],
["definitely","kesin biçimde"],
["derive","-den türemek, -den elde etmek"],
["devise","tasarlamak, planlamak"],
["dimension","boyut, ebat"],
["distinct","ayrı, farklı"],
["distinction","ayırım, fark"],
["diminish","azalmak"],
["environment","çevre, ortam"],
["environmental","çevre ile ilgili"],
["equate","eşitlemek"],
["equation","eşitlik"],
["equivalent","eşdeğer"],
["establish","kurmak"],
["evaluate","değerlendirmek"],
["evaluation","değerlendirme"],
["evident","açık, belli"],
["evidently","açık biçimde"],
["formulate","kesin ve açık olarak belirtmek"],
["identify","tespit etmek"],
["identifiable","fark edilebilir"],
["identification","kimlik"],
["ignore","gözardı etmek"],
["illustrate","örneklemek"],
["illustration","tasvir, resim"],
["impact","etki"],
["imply","ima etmek"],
["implication","ima"],
["implicit","ima edilen"],
["indicate","işaret etmek, göstermek"],
["indicator","işaret"],
["initial","ilk"],
["initially","başlangıçta"],
["interpret","yorumlamak"],
["interpretation","yorum"],
["involve","gerektirmek"],
["involvement","katılım"],
["magnitude","büyüklük"],
["modify","biraz değiştirmek"],
["modification","değiştirme"],
["obvious","apaçık"],
["obviously","besbelli"],
["presume","varsaymak"],
["presumably","herhalde"],
["presumption","varsayım"],
["prime","ilk, baş"],
["proceed","devam etmek"],
["publish","yayımlamak"],
["publisher","yayıncı"],
["publishing","yayıncılık"],
["pursue","takip etmek"],
["pursuer","takipçi"],
["pursuit","takip"],
["random","rastgele"],
["randomly","gelişigüzel biçimde"],
["range","aralık"],
["region","bölge"],
["regional","bölgesel"],
["require","gerektirmek"],
["requirement","gereksinim"],
["restrict","kısıtlamak"],
["restricted","kısıtlı"],
["restriction","kısıtlama"],
["restrictive","kısıtlayıcı"],
["reverse","ters çevirmek"],
["reversible","ters çevrilebilir"],
["similar","benzer"],
["similarity","benzerlik"],
["similarly","benzer şekilde"],
["specify","belirtmek"],
["specific","açık, net"],
["specifically","açıkça"],
["status","statü, durum"],
["subsequent","sonraki"],
["subsequently","onun ardından"],
["suffice","yeterli olmak"],
["sum","toplam"],
["summary","özet"],
["tense","gergin"],
["tension","gerginlik"],
["ultimate","nihai"],
["ultimately","son olarak"],
["valid","geçerli"],
["validate","geçerli hale gelmek"],
["validity","geçerlilik"],
["vary","değişmek"],
["varied","çeşitli"],
["variable","değişken"],
["vertical","dikey"],
["vertically","dikey olarak"]

];

var current = 0;
var correctCount = 0;
var wrongCount = 0;
var currentCorrect = "";
var currentType = "";
var wrongQuestions = [];

shuffle(words);

function shuffle(array){
for(var i=array.length-1;i>0;i--){
var j=Math.floor(Math.random()*(i+1));
var temp=array[i];
array[i]=array[j];
array[j]=temp;
}
}

function normalize(text){
return text
.toLowerCase()
.replaceAll("ı","i")
.replaceAll("ğ","g")
.replaceAll("ü","u")
.replaceAll("ş","s")
.replaceAll("ö","o")
.replaceAll("ç","c")
.trim();
}

function loadQuestion(){

document.getElementById("nextBtn").classList.add("hidden");
document.getElementById("result").innerHTML = "";

if(current >= words.length){

document.getElementById("question").innerHTML =
"Quiz Bitti 🎉";

document.getElementById("multipleChoiceArea").innerHTML = "";

document.getElementById("openEndedArea").classList.add("hidden");

document.getElementById("result").innerHTML =
"Doğru: " + correctCount +
"<br>Yanlış: " + wrongCount +
"<br>Başarı: %" +
Math.round((correctCount/words.length)*100) +
"<br><br><button onclick='retryWrong()'>Yanlışları Tekrar Çöz</button>";

return;
}

var item = words[current];

var askTR = Math.random() > 0.5;
var openEnded = Math.random() > 0.5;

var questionText = "";
var correct = "";

if(askTR){
questionText = item[0] + " kelimesinin Türkçesi nedir?";
correct = item[1];
}else{
questionText = item[1] + " ifadesinin İngilizcesi nedir?";
correct = item[0];
}

currentCorrect = correct;
currentType = openEnded ? "open" : "multi";

document.getElementById("question").innerHTML = questionText;

document.getElementById("counter").innerHTML =
"Soru " + (current+1) + " / " + words.length;

document.getElementById("mode").innerHTML =
openEnded ? "Açık Uçlu" : "Çoktan Seçmeli";

if(openEnded){

document.getElementById("multipleChoiceArea").innerHTML = "";
document.getElementById("openEndedArea").classList.remove("hidden");
document.getElementById("answerInput").value = "";
document.getElementById("answerInput").focus();

}else{

document.getElementById("openEndedArea").classList.add("hidden");

var options = [correct];

while(options.length < 4){

var rand = words[Math.floor(Math.random()*words.length)];
var value = askTR ? rand[1] : rand[0];

if(options.indexOf(value) === -1){
options.push(value);
}
}

shuffle(options);

var html = "";

for(var i=0;i<options.length;i++){

html += "<button class='choice' onclick='checkMulti(this)'>" +
options[i] +
"</button>";
}

document.getElementById("multipleChoiceArea").innerHTML = html;
}
}

function checkMulti(btn){

var buttons = document.getElementsByClassName("choice");

for(var i=0;i<buttons.length;i++){

buttons[i].disabled = true;

if(buttons[i].innerHTML === currentCorrect){
buttons[i].className = "choice correct";
}
}

if(btn.innerHTML === currentCorrect){

correctCount++;

}else{

wrongCount++;
wrongQuestions.push(words[current]);

btn.className = "choice wrong";
}

updateScore();

document.getElementById("nextBtn").classList.remove("hidden");
}

document.getElementById("checkBtn").onclick = function(){

var user =
normalize(document.getElementById("answerInput").value);

var answers =
currentCorrect.split(",");

var correct = false;

for(var i=0;i<answers.length;i++){

if(user === normalize(answers[i])){

correct = true;
}
}

if(correct){

correctCount++;

document.getElementById("result").innerHTML =
"<span style='color:#22c55e'>Doğru ✅</span>";

}else{

wrongCount++;
wrongQuestions.push(words[current]);

document.getElementById("result").innerHTML =
"<span style='color:#ef4444'>Yanlış ❌</span><br><br>" +
"Doğru cevap:<br>" + currentCorrect;
}

updateScore();

document.getElementById("nextBtn").classList.remove("hidden");
};

function updateScore(){

document.getElementById("score").innerHTML =
"Doğru: " + correctCount +
" | Yanlış: " + wrongCount;
}

document.getElementById("nextBtn").onclick = function(){

current++;
loadQuestion();
};

document.getElementById("answerInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
document.getElementById("checkBtn").click();
}
});

function retryWrong(){

if(wrongQuestions.length === 0){
return;
}

words = wrongQuestions;
wrongQuestions = [];

current = 0;
correctCount = 0;
wrongCount = 0;

shuffle(words);

loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
